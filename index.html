<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0D3B1A">
<title>Bolão da Alegria ⚽</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, setDoc, getDoc, getDocs, updateDoc, arrayUnion, onSnapshot, query, where, serverTimestamp, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics.js";

// Credenciais atualizadas do banco de homologação
const firebaseConfig = {
  apiKey: "AIzaSyDIg_DxCxbl0nfr4oOpzsT07DGqL6phdFQ",
  authDomain: "homolboloadaalegria.firebaseapp.com",
  projectId: "homolboloadaalegria",
  storageBucket: "homolboloadaalegria.firebasestorage.app",
  messagingSenderId: "37803285375",
  appId: "1:37803285375:web:cfb0ba26b8bc33a3c0d84a",
  measurementId: "G-C2QY6V32FG"
};

const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
const auth = getAuth(app);
const db = getFirestore(app);

// ── STATE ─────────────────────────────────────────────────────────────────────
let currentUser = null;
let currentBolao = null;
let unsubscribeBolao = null;
let userProfile = {};

// ── UTILS ─────────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const toast = (msg, type='info') => {
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.classList.add('show'), 10);
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 400); }, 3200);
};
const loading = show => { const el=$('loading-overlay'); if(el) el.style.display=show?'flex':'none'; };

// ── AUTH ──────────────────────────────────────────────────────────────────────
onAuthStateChanged(auth, async user => {
  if (user) {
    currentUser = user;
    try {
      const snap = await getDoc(doc(db,'users',user.uid));
      userProfile = snap.exists() ? snap.data() : {};
    } catch(e) { userProfile = {}; }
    updateTopBar();
    showView('home');
    loadUserBoloes();
  } else {
    currentUser = null;
    userProfile = {};
    showView('auth');
  }
});

function updateTopBar() {
  const el = $('user-name-display');
  if(el) el.textContent = currentUser?.displayName || currentUser?.email?.split('@')[0] || '—';
}

window.registerUser = async () => {
  const name = $('reg-name').value.trim();
  const email = $('reg-email').value.trim();
  const pass = $('reg-pass').value;
  if (!name||!email||!pass) { toast('Preencha todos os campos','error'); return; }
  loading(true);
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pass);
    await updateProfile(cred.user, { displayName: name });
    await setDoc(doc(db,'users',cred.user.uid), { name, email, phone:'', pixRecebimento:'', createdAt: serverTimestamp() });
    toast('Cadastro realizado! Bem-vindo! 🎉','success');
  } catch(e) { toast(firebaseError(e.code),'error'); } finally { loading(false); }
};

window.loginUser = async () => {
  const email = $('login-email').value.trim();
  const pass = $('login-pass').value;
  if (!email||!pass) { toast('Preencha e-mail e senha','error'); return; }
  loading(true);
  try { await signInWithEmailAndPassword(auth, email, pass); }
  catch(e) { toast(firebaseError(e.code),'error'); } finally { loading(false); }
};

window.logoutUser = async () => {
  if(unsubscribeBolao) unsubscribeBolao();
  await signOut(auth);
  toast('Até logo! 👋','info');
};

// ── NAVIGATION ────────────────────────────────────────────────────────────────
window.showView = view => {
  document.querySelectorAll('.view').forEach(v => v.style.display='none');
  const el = $('view-'+view);
  if(el) el.style.display='block';
  if(view==='home') loadUserBoloes();
  if(view==='profile') renderProfile();
};

window.showTab = tab => {
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.auth-panel').forEach(p => p.style.display='none');
  document.querySelector(`.auth-tab[data-tab="${tab}"]`).classList.add('active');
  $('panel-'+tab).style.display='block';
};

// ── PROFILE ───────────────────────────────────────────────────────────────────
window.renderProfile = async () => {
  if(!currentUser) return;
  try {
    const snap = await getDoc(doc(db,'users',currentUser.uid));
    userProfile = snap.exists() ? snap.data() : {};
  } catch(e) {}
  const el = $('profile-content');
  if(!el) return;
  el.innerHTML = `
  <div class="profile-avatar">${(currentUser.displayName||'U')[0].toUpperCase()}</div>
  <div class="form-group"><label>Nome completo</label>
    <input type="text" id="p-name" value="${userProfile.name||currentUser.displayName||''}"></div>
  <div class="form-group"><label>E-mail</label>
    <input type="email" id="p-email" value="${currentUser.email}" disabled style="opacity:.5"></div>
  <div class="form-group"><label>Telefone (opcional)</label>
    <input type="tel" id="p-phone" placeholder="(11) 99999-9999" value="${userProfile.phone||''}"></div>
  <div class="form-group"><label>🏦 Chave PIX para receber prêmios</label>
    <input type="text" id="p-pix" placeholder="CPF, e-mail, telefone ou chave aleatória" value="${userProfile.pixRecebimento||''}">
    <div class="field-hint">Exibida ao administrador financeiro quando você ganhar.</div>
  </div>
  <button class="btn-primary" onclick="saveProfile()">💾 Salvar Perfil</button>`;
};

window.saveProfile = async () => {
  const name = $('p-name').value.trim();
  const phone = $('p-phone').value.trim();
  const pix = $('p-pix').value.trim();
  if(!name) { toast('Informe seu nome','error'); return; }
  loading(true);
  try {
    await updateProfile(currentUser, { displayName: name });
    await setDoc(doc(db,'users',currentUser.uid), { name, email:currentUser.email, phone, pixRecebimento:pix, updatedAt:serverTimestamp() }, { merge:true });
    userProfile = { ...userProfile, name, phone, pixRecebimento:pix };
    updateTopBar();
    toast('Perfil salvo! ✅','success');
  } catch(e) { toast('Erro ao salvar','error'); } finally { loading(false); }
};

// ── BOLÃO CRUD ────────────────────────────────────────────────────────────────
window.createBolao = async () => {
  const name=$('b-name').value.trim(), team1=$('b-team1').value.trim(), team2=$('b-team2').value.trim();
  const date=$('b-date').value, time=$('b-time').value;
  const valor=parseFloat($('b-valor').value), pix=$('b-pix').value.trim();
  const emailsRaw=$('b-emails').value.trim();
  if(!name||!team1||!team2||!date||!time||!valor||!pix){ toast('Preencha todos os campos obrigatórios','error'); return; }
  loading(true);
  try {
    const gameDateTime = new Date(date+'T'+time);
    const emails = emailsRaw ? emailsRaw.split(',').map(e=>e.trim()).filter(Boolean) : [];
    await addDoc(collection(db,'boloes'), {
      name, team1, team2, gameDateTime: gameDateTime.toISOString(),
      valorLance: valor, pixKey: pix, invitedEmails: emails,
      creatorId: currentUser.uid,
      creatorName: currentUser.displayName||currentUser.email,
      adminId: currentUser.uid,
      adminName: currentUser.displayName||currentUser.email.split('@')[0],
      createdAt: serverTimestamp(), status:'open',
      participants:[], lances:[], resultado:null, ganhadores:null, acumulado:0
    });
    toast('Bolão criado! 🎉','success');
    ['b-name','b-team1','b-team2','b-date','b-time','b-valor','b-pix','b-emails'].forEach(id=>{ if($(id)) $(id).value=''; });
    showView('home');
  } catch(e) { toast('Erro ao criar: '+e.message,'error'); } finally { loading(false); }
};

// ── LOAD BOLÕES ───────────────────────────────────────────────────────────────
window.loadUserBoloes = async () => {
  if(!currentUser) return;
  const container=$('boloes-list');
  if(!container) return;
  container.innerHTML='<div class="loading-dots"><span></span><span></span><span></span></div>';
  try {
    const q1=query(collection(db,'boloes'),where('creatorId','==',currentUser.uid));
    const snap1=await getDocs(q1);
    const allSnap=await getDocs(collection(db,'boloes'));
    const seen=new Set(); const boloes=[];
    snap1.forEach(d=>{ if(!seen.has(d.id)){seen.add(d.id);boloes.push({id:d.id,...d.data()});} });
    allSnap.forEach(d=>{
      if(seen.has(d.id)) return;
      const data=d.data();
      const mine=(data.lances||[]).some(l=>l.userId===currentUser.uid);
      const inv=(data.invitedEmails||[]).includes(currentUser.email);
      const part=(data.participants||[]).some(p=>p.userId===currentUser.uid);
      if(mine||inv||part){seen.add(d.id);boloes.push({id:d.id,...data});}
    });
    if(!boloes.length){
      container.innerHTML=`<div class="empty-state"><span class="empty-icon">⚽</span><p>Nenhum bolão ainda.<br>Crie um ou aguarde um convite!</p></div>`;
      return;
    }
    boloes.sort((a,b)=>{
      const order={open:0,closed:1,finished:2};
      if(order[a.status]!==order[b.status]) return order[a.status]-order[b.status];
      return new Date(b.createdAt?.seconds*1000||0)-new Date(a.createdAt?.seconds*1000||0);
    });
    container.innerHTML=boloes.map(b=>renderBolaoCard(b)).join('');
  } catch(e){ container.innerHTML='<p style="color:#ff6b6b;text-align:center">Erro ao carregar bolões</p>'; }
};

function renderBolaoCard(b) {
  const gd=new Date(b.gameDateTime);
  const isCreator=b.creatorId===currentUser.uid;
  const totalLances=(b.lances||[]).length;
  const pagosComp=(b.lances||[]).filter(l=>l.pago&&l.comprovante).length;
  const participants=[...new Set((b.lances||[]).map(l=>l.userName))];
  const pot=pagosComp*(b.valorLance||0)+(b.acumulado||0);
  const badge=b.status==='finished'?'<span class="badge badge-finished">Finalizado</span>':b.status==='closed'?'<span class="badge badge-closed">Encerrado</span>':'<span class="badge badge-open">Aberto</span>';
  return `
  <div class="bolao-card" onclick="openBolao('${b.id}')">
    <div class="bolao-card-header"><span class="bolao-card-name">${b.name}</span>${badge}</div>
    <div class="bolao-vs">
      <span class="team-name">${b.team1}</span>
      <span class="vs-badge">VS</span>
      <span class="team-name">${b.team2}</span>
    </div>
    <div class="bolao-meta">
      <span>📅 ${gd.toLocaleDateString('pt-BR')} ${gd.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</span>
      <span>💰 R$ ${b.valorLance?.toFixed(2)}</span>
    </div>
    <div class="bolao-stats-row">
      <div class="stat-mini"><span>${participants.length}</span><label>Apostadores</label></div>
      <div class="stat-mini"><span>${totalLances}</span><label>Lances</label></div>
      <div class="stat-mini"><span>${pagosComp}</span><label>Conf.</label></div>
      <div class="stat-mini pot"><span>R$${pot.toFixed(0)}</span><label>Pot</label></div>
    </div>
    ${isCreator?'<div class="creator-badge">👑 Criador</div>':''}
  </div>`;
}

// ── OPEN BOLÃO ────────────────────────────────────────────────────────────────
window.openBolao = async bolaoId => {
  loading(true);
  try {
    if(unsubscribeBolao) unsubscribeBolao();
    unsubscribeBolao=onSnapshot(doc(db,'boloes',bolaoId), snap=>{
      if(!snap.exists()){ toast('Bolão não encontrado','error'); return; }
      currentBolao={id:snap.id,...snap.data()};
      renderBolaoDetail(currentBolao);
    });
    showView('bolao-detail');
  } catch(e){ toast('Erro ao abrir bolão','error'); } finally{ loading(false); }
};

// ── COLLAPSIBLE CARD ──────────────────────────────────────────────────────────
window.toggleCard = id => {
  const body=$('card-body-'+id);
  const icon=$('card-icon-'+id);
  if(!body) return;
  const open=body.style.display!=='none';
  body.style.display=open?'none':'block';
  if(icon) icon.textContent=open?'▸':'▾';
};

// ── RENDER BOLÃO DETAIL ───────────────────────────────────────────────────────
function renderBolaoDetail(b) {
  const gd=new Date(b.gameDateTime);
  const now=new Date();
  const diff=gd-now;
  const isCreator=b.creatorId===currentUser.uid;
  const isAdmin=(b.adminId||b.creatorId)===currentUser.uid;
  const canSeeAdminPanel=isAdmin||isCreator; 
  const lances=b.lances||[];
  const isParticipant=(b.participants||[]).some(p=>p.userId===currentUser.uid);
  const hasLances=lances.some(l=>l.userId===currentUser.uid);
  const canSeeContent=isCreator||isParticipant||hasLances;
  const myLances=lances.filter(l=>l.userId===currentUser.uid);
  const uniqueParticipants=[...new Map(lances.map(l=>[l.userId,{id:l.userId,name:l.userName}])).values()];
  const pagosComp=lances.filter(l=>l.pago&&l.comprovante);
  const totalPago=pagosComp.length*(b.valorLance||0)+(b.acumulado||0);
  const adminName=b.adminName||b.creatorName||'—';
  const deadline=new Date(gd.getTime()-30*60*1000);
  const apostaEncerrada=now>=deadline||b.status!=='open';
  const canBet=!apostaEncerrada&&canSeeContent;
  const link=`${location.origin}${location.pathname}?bolao=${b.id}`;

  let countdown=diff>0
    ?`⏱ ${Math.floor(diff/3600000)}h ${Math.floor((diff%3600000)/60000)}min ${Math.floor((diff%60000)/1000)}s`
    :'🔴 Em andamento / finalizado';

  const el=$('bolao-detail-content');
  if(!el) return;

  if(!canSeeContent){
    el.innerHTML=`
    <div class="detail-header">
      <button class="btn-back" onclick="showView('home')">← Voltar</button>
      <div class="detail-title">${b.name}</div>
      <div class="detail-status">${countdown}</div>
    </div>
    <div class="vs-hero">
      <div class="team-hero">${b.team1}</div>
      <div class="vs-center"><div class="vs-big">VS</div>
        <div class="game-date">${gd.toLocaleDateString('pt-BR')} • ${gd.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</div>
      </div>
      <div class="team-hero">${b.team2}</div>
    </div>
    <div class="join-card">
      <div class="join-icon">🎟️</div>
      <div class="join-title">Você foi convidado!</div>
      <div class="join-desc">Participe do <strong>${b.name}</strong> e faça sua aposta no placar.</div>
      <div class="join-info"><span>💰 R$ ${b.valorLance?.toFixed(2)} por lance</span><span>👑 ${b.creatorName}</span></div>
      <div class="aviso-comprovante">⚠️ Somente apostas <strong>com comprovante</strong> participam do prêmio.</div>
      <button class="btn-primary btn-join" onclick="participarBolao('${b.id}')">🎟️ Participar do Bolão</button>
    </div>`;
    startCountdown(gd,b.id);
    return;
  }

  const lancesPublicosHTML = renderLancesPublicos(b);

  const infoCardHTML = `
  <div class="collapsible-card" id="card-info">
    <button class="card-header" onclick="toggleCard('info')">
      <span>📋 Informações do Bolão</span>
      <span class="card-toggle-icon" id="card-icon-info">▾</span>
    </button>
    <div class="card-body" id="card-body-info">
      <div class="admin-banner">
        <span class="admin-icon">💼</span>
        <div class="admin-text">
          <div class="admin-label">Administrador Financeiro</div>
          <div class="admin-name">${adminName}</div>
        </div>
        ${isCreator?`<button class="btn-trocar-admin" onclick="abrirModalAdmin('${b.id}')">Trocar</button>`:''}
      </div>
      <div class="info-grid">
        <div class="info-card">💰 Valor por lance<br><strong>R$ ${b.valorLance?.toFixed(2)}</strong></div>
        <div class="info-card">💳 PIX p/ pagamento<br><strong class="pix-key" onclick="copyPix('${b.pixKey}')">${b.pixKey} 📋</strong></div>
      </div>
      <div class="stats-row">
        <div class="stat-box"><span class="stat-num">${uniqueParticipants.length}</span><span class="stat-label">Apostadores</span></div>
        <div class="stat-box"><span class="stat-num">${lances.length}</span><span class="stat-label">Lances</span></div>
        <div class="stat-box"><span class="stat-num">${pagosComp.length}</span><span class="stat-label">Pagos c/ Comp.</span></div>
        <div class="stat-box total-box"><span class="stat-num">R$${totalPago.toFixed(0)}</span><span class="stat-label">Pot Total</span></div>
      </div>
      ${b.acumulado>0?`<div class="acumulado-banner">🏆 Acumulado anterior: R$ ${b.acumulado.toFixed(2)}</div>`:''}
      <div class="aviso-comprovante-inline">⚠️ Somente apostas <strong>com comprovante</strong> participam do prêmio.</div>
      <div class="participants-row">
        <div class="participants-label">👥 Participantes (${uniqueParticipants.length})</div>
        ${uniqueParticipants.length===0?'<span class="empty-p">Nenhum ainda.</span>':
          `<div class="participant-list">${uniqueParticipants.map(p=>`<span class="participant-chip">${p.name}</span>`).join('')}</div>`}
      </div>
      ${isCreator?`
      <div class="share-row">
        <div class="share-label">📨 Link de convite</div>
        <div class="share-link-box">
          <input type="text" readonly value="${link}">
          <button class="btn-copy" onclick="copyLink('${link}')">Copiar</button>
        </div>
        ${b.invitedEmails?.length?`<div class="invited-list">Convidados: ${b.invitedEmails.join(', ')}</div>`:''}
      </div>`:''}
      ${isCreator&&b.status==='open'?`
      <button class="btn-danger" style="margin-top:12px" onclick="encerrarBolao('${b.id}')">🔒 Encerrar Bolão Manualmente</button>`:''}
    </div>
  </div>`;

  const myLancesHTML = myLances.length>0?`
  <div class="my-lances-list">
    <div class="my-lances-title">Meus Lances</div>
    ${myLances.map(l=>`
    <div class="my-lance-card ${l.pago&&l.comprovante?'pago':l.pago?'pago-sem-comp':'pendente'}">
      <div class="lance-placar">${b.team1} ${l.gol1} × ${l.gol2} ${b.team2}</div>
      <div class="lance-status">${l.pago&&l.comprovante?'✅ Pago com comprovante':l.pago?'⚠️ Pago sem comprovante':'⏳ Aguardando pagamento'}</div>
      ${!l.comprovante&&!apostaEncerrada?`
      <div class="pix-reminder">PIX: <span class="pix-key" onclick="copyPix('${b.pixKey}')">${b.pixKey} 📋</span> — R$ ${b.valorLance?.toFixed(2)}</div>
      <div class="comprovante-upload">
        <input type="file" id="comp-${l.id}" accept="image/*,application/pdf" onchange="uploadComprovante('${b.id}','${l.id}',this)">
        <label for="comp-${l.id}" class="btn-upload">📎 Anexar Comprovante (confirma pagamento)</label>
      </div>
      ${!l.pago?`<div class="divider-or">— ou —</div>
      <button class="btn-pago-sem" onclick="confirmarPagamento('${b.id}','${l.id}')">Marcar pago sem comprovante</button>`:''}
      `:!l.comprovante&&apostaEncerrada?`
      <div class="encerrado-aviso">🔒 Apostas encerradas — comprovante não aceito.</div>
      `:`
      <div class="comprovante-pago">
        <button class="btn-ver-comp" onclick="verComprovante('${l.id}')">📄 Ver Comprovante</button>
      </div>`}
    </div>`).join('')}
    ${myLances.some(l=>l.pago&&l.comprovante)&&myLances.filter(l=>l.pago&&l.comprovante).some(l=>!l.concluido)?`
    <button class="btn-concluir" onclick="concluirApostas('${b.id}')">🏁 Concluir Minhas Apostas</button>`:''}
    ${myLances.length&&myLances.every(l=>l.concluido)?'<div class="concluido-msg">✅ Suas apostas estão concluídas!</div>':''}
  </div>`:'';

  const lancesCardOpen = canBet || myLances.length>0;
  const lanceCardHTML=`
  <div class="collapsible-card" id="card-lances">
    <button class="card-header" onclick="toggleCard('lances')">
      <span>⚽ Lances</span>
      <div class="card-header-right">
        ${myLances.length>0?`<span class="badge-count">${myLances.length} lance${myLances.length>1?'s':''}</span>`:''}
        <span class="card-toggle-icon" id="card-icon-lances">${lancesCardOpen?'▾':'▸'}</span>
      </div>
    </button>
    <div class="card-body" id="card-body-lances" style="display:${lancesCardOpen?'block':'none'}">
      ${apostaEncerrada?`<div class="apostaEncerrada">🔒 Apostas encerradas${b.status!=='open'?' (bolão encerrado)':' (30 min antes do jogo)'}</div>`:`
      <div class="bet-subcard">
        <div class="bet-subcard-title">🎯 Fazer Lance</div>
        <div class="score-input-row">
          <div class="score-team">${b.team1}</div>
          <input type="number" id="score1" min="0" max="20" placeholder="0" class="score-input">
          <span class="score-sep">×</span>
          <input type="number" id="score2" min="0" max="20" placeholder="0" class="score-input">
          <div class="score-team">${b.team2}</div>
        </div>
        <div class="deadline-info">⏰ Apostas encerram 30 min antes do jogo</div>
        <button class="btn-primary" onclick="addLance()">+ Adicionar Lance — R$ ${b.valorLance?.toFixed(2)}</button>
      </div>`}
      ${myLancesHTML}
    </div>
  </div>`;

  const adminPanelHTML=canSeeAdminPanel?renderPainelAdmin(b):'';
  const resultadosHTML=(b.status==='closed'||b.status==='finished')?renderResultados(b):'';

  const informarResultadoHTML=canSeeAdminPanel&&b.status==='closed'?`
  <div class="collapsible-card" id="card-resultado">
    <button class="card-header" onclick="toggleCard('resultado')">
      <span>🏆 Informar Resultado Final</span>
      <span class="card-toggle-icon" id="card-icon-resultado">▾</span>
    </button>
    <div class="card-body" id="card-body-resultado">
      <div class="score-input-row">

window.addLance = async () => {
  if(!currentBolao) return;
  const g1=parseInt($('score1').value), g2=parseInt($('score2').value);
  if(isNaN(g1)||isNaN(g2)||g1<0||g2<0){ toast('Informe o placar','error'); return; }
  const gd=new Date(currentBolao.gameDateTime);
  const deadline=new Date(gd.getTime()-30*60*1000);
  if(new Date()>=deadline||currentBolao.status!=='open'){ toast('Apostas encerradas','error'); return; }
  loading(true);
  try {
    const lanceId=Date.now().toString(36)+Math.random().toString(36).slice(2);
    await updateDoc(doc(db,'boloes',currentBolao.id),{lances:arrayUnion({
      id:lanceId, userId:currentUser.uid,
      userName:currentUser.displayName||currentUser.email.split('@')[0],
      userEmail:currentUser.email,
      gol1:g1, gol2:g2, pago:false, concluido:false, comprovante:null,
      timestamp:new Date().toISOString()
    })});
    if($('score1')) $('score1').value='';
    if($('score2')) $('score2').value='';
    toast('Lance adicionado! Pague o PIX para confirmar. 💳','success');
  } catch(e){ toast('Erro ao adicionar lance','error'); } finally{ loading(false); }
};

window.confirmarPagamento = async (bolaoId, lanceId) => {
  const gd=new Date(currentBolao?.gameDateTime);
  const deadline=new Date(gd.getTime()-30*60*1000);
  if(new Date()>=deadline||currentBolao?.status!=='open'){ toast('Apostas encerradas','error'); return; }
  loading(true);
  try {
    const snap=await getDoc(doc(db,'boloes',bolaoId));
    const lances=(snap.data().lances||[]).map(l=>l.id===lanceId?{...l,pago:true}:l);
    await updateDoc(doc(db,'boloes',bolaoId),{lances});
    toast('Pagamento confirmado! ✅','success');
  } catch(e){ toast('Erro','error'); } finally{ loading(false); }
};

window.uploadComprovante = async (bolaoId, lanceId, input) => {
  const file=input.files[0]; if(!file) return;
  if(currentBolao){
    const gd=new Date(currentBolao.gameDateTime);
    const deadline=new Date(gd.getTime()-30*60*1000);
    if(new Date()>=deadline||currentBolao.status!=='open'){
      toast('Apostas encerradas — comprovante não aceito','error'); input.value=''; return;
    }
  }
  if(file.size>5*1024*1024){ toast('Arquivo muito grande (máx 5MB)','error'); return; }
  loading(true);
  try {
    const base64=await compressImage(file,800,0.65);
    const snap=await getDoc(doc(db,'boloes',bolaoId));
    const lances=(snap.data().lances||[]).map(l=>l.id===lanceId?{...l,comprovante:base64,pago:true}:l);
    await updateDoc(doc(db,'boloes',bolaoId),{lances});
    toast('Comprovante enviado e pagamento confirmado! ✅','success');
  } catch(e){ toast('Erro: '+e.message,'error'); } finally{ loading(false); }
};

function compressImage(file,maxWidth,quality) {
  return new Promise((res,rej)=>{
    if(file.type==='application/pdf'){
      const r=new FileReader(); r.onload=e=>res(e.target.result); r.onerror=rej; r.readAsDataURL(file); return;
    }
    const img=new Image(); const url=URL.createObjectURL(file);
    img.onload=()=>{
      URL.revokeObjectURL(url);
      const scale=Math.min(1,maxWidth/img.width);
      const canvas=document.createElement('canvas');
      canvas.width=Math.round(img.width*scale); canvas.height=Math.round(img.height*scale);
      canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
      res(canvas.toDataURL('image/jpeg',quality));
    };
    img.onerror=rej; img.src=url;
  });
}

window.concluirApostas = async bolaoId => {
  loading(true);
  try {
    const snap=await getDoc(doc(db,'boloes',bolaoId));
    const b=snap.data();
    const lances=(b.lances||[]).map(l=>l.userId===currentUser.uid&&l.pago?{...l,concluido:true}:l);
    await updateDoc(doc(db,'boloes',bolaoId),{lances});
    const gd=new Date(b.gameDateTime);
    const deadline=new Date(gd.getTime()-30*60*1000);
    const pagos=lances.filter(l=>l.pago);
    if(pagos.length>0&&pagos.every(l=>l.concluido)||new Date()>=deadline){
      await updateDoc(doc(db,'boloes',bolaoId),{status:'closed',lances});
    }
    toast('Apostas concluídas! Boa sorte! 🍀','success');
  } catch(e){ toast('Erro','error'); } finally{ loading(false); }
};

// ── RESULTADO ─────────────────────────────────────────────────────────────────
window.informarResultado = async bolaoId => {
  const g1=parseInt($('res1').value), g2=parseInt($('res2').value);
  if(isNaN(g1)||isNaN(g2)){ toast('Informe o placar final','error'); return; }
  loading(true);
  try {
    const snap=await getDoc(doc(db,'boloes',bolaoId));
    const b=snap.data();
    const lances=(b.lances||[]).filter(l=>l.pago&&l.comprovante);
    const total=lances.length*(b.valorLance||0)+(b.acumulado||0);
    const acertadores=lances.filter(l=>parseInt(l.gol1)===g1&&parseInt(l.gol2)===g2);
    let ganhadores=[], acumulado=0;
    if(acertadores.length){
      const val=total/acertadores.length;
      ganhadores=acertadores.map(l=>({userId:l.userId,name:l.userName,email:l.userEmail,valor:val}));
    } else { acumulado=total; }
    await updateDoc(doc(db,'boloes',bolaoId),{resultado:{gol1:g1,gol2:g2},ganhadores,acumulado,status:'finished'});
    toast(ganhadores.length?`🏆 ${ganhadores.length} ganhador(es)!`:'😔 Acumulado!','success');
  } catch(e){ toast('Erro','error'); } finally{ loading(false); }
};

// ── COUNTDOWN ─────────────────────────────────────────────────────────────────
let countdownInterval=null;
function startCountdown(gameDate, bolaoId){
  if(countdownInterval) clearInterval(countdownInterval);
  countdownInterval=setInterval(()=>{
    const diff=gameDate-new Date();
    const el=document.querySelector('.detail-status');
    if(!el){ clearInterval(countdownInterval); return; }
    if(diff<=0){ el.textContent='🔴 Em andamento / finalizado'; clearInterval(countdownInterval); return; }
    const h=Math.floor(diff/3600000),m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000);
    el.textContent=`⏱ ${h}h ${m}min ${s}s`;
    if(diff<=1800000&&currentBolao?.status==='open'){
      updateDoc(doc(db,'boloes',bolaoId),{status:'closed'}).catch(()=>{});
    }
  },1000);
}

// ── FIREBASE ERRORS ───────────────────────────────────────────────────────────
function firebaseError(code){
  const m={'auth/email-already-in-use':'E-mail já cadastrado','auth/weak-password':'Senha fraca (mín 6 chars)',
    'auth/invalid-email':'E-mail inválido','auth/user-not-found':'Usuário não encontrado',
    'auth/wrong-password':'Senha incorreta','auth/invalid-credential':'E-mail ou senha incorretos',
    'auth/too-many-requests':'Muitas tentativas. Tente mais tarde'};
  return m[code]||'Erro: '+code;
}

  <div class="top-bar">
    <div class="top-bar-row">
      <div class="app-title">⚽ Bolão da Alegria</div>
      <div class="top-bar-actions">
        <button class="btn-profile" onclick="showView('profile')">
          👤 <span id="user-name-display">—</span>
        </button>
        <button class="btn-logout" onclick="logoutUser()">Sair</button>
      </div>
    </div>
  </div>
  <div class="home-content">
    <div class="section-header">
      <h2>Meus Bolões</h2>
      <button class="btn-new" onclick="showView('create')">+ Novo</button>
    </div>
    <div id="boloes-list"><div class="loading-dots"><span></span><span></span><span></span></div></div>
  </div>
  <nav class="bottom-nav">
    <button class="nav-btn active" onclick="showView('home')"><span class="icon">🏠</span>Início</button>
    <button class="nav-btn" onclick="showView('create')"><span class="icon">➕</span>Criar</button>
    <button class="nav-btn" onclick="showView('profile')"><span class="icon">👤</span>Perfil</button>
    <button class="nav-btn" onclick="loadUserBoloes()"><span class="icon">🔄</span>Atualizar</button>
  </nav>
</div>

<div class="view" id="view-profile">
  <div class="profile-header">
    <button class="btn-back" onclick="showView('home')">← Voltar</button>
    <h2>👤 Meu Perfil</h2>
  </div>
  <div class="profile-form" id="profile-content">
    <div class="loading-dots" style="padding:40px"><span></span><span></span><span></span></div>
  </div>
</div>

<div class="view" id="view-create">
  <div class="view-header">
    <button class="btn-back" onclick="showView('home')">←</button>
    <h2>⚽ Criar Bolão</h2>
  </div>
  <div class="create-form">
    <div class="form-group"><label>Nome do Bolão *</label><input type="text" id="b-name" placeholder="Ex: Bolão da Galera — Brasil x Argentina"></div>
    <div class="form-row">
      <div class="form-group"><label>Time 1 *</label><input type="text" id="b-team1" placeholder="Brasil"></div>
      <div class="form-group"><label>Time 2 *</label><input type="text" id="b-team2" placeholder="Argentina"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Data *</label><input type="date" id="b-date"></div>
      <div class="form-group"><label>Horário *</label><input type="time" id="b-time"></div>
    </div>
    <div class="form-group"><label>Valor por Lance (R$) *</label><input type="number" id="b-valor" placeholder="10.00" step="0.01" min="0.01"></div>
    <div class="form-group"><label>Chave PIX para receber pagamentos *</label><input type="text" id="b-pix" placeholder="CPF, e-mail, telefone ou chave aleatória"></div>
    <div class="form-group"><label>E-mails dos convidados (separados por vírgula)</label><textarea id="b-emails" placeholder="amigo@email.com, outro@email.com"></textarea></div>
    <button class="btn-primary" onclick="createBolao()">🎉 Criar Bolão</button>
    <br><br>
  </div>
</div>

<div class="view" id="view-bolao-detail">
  <div id="bolao-detail-content">
    <div class="loading-dots" style="padding:60px"><span></span><span></span><span></span></div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const loginPanel = document.getElementById('panel-login');
  if(loginPanel) loginPanel.style.display='block';
});
</script>
</body>
</html>
